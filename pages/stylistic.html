<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Stylistic photography portfolio.">

    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "w8kyhgi5ei");
</script>
</head>
<body>

  <!-- ── Navigation ── -->
  <nav>
    <a href="../" class="nav-logo">Your<span>.</span>Name</a>
    <ul class="nav-links">
      <li><a href="../">Home</a></li>
      <li><a href="contact">Contact</a></li>
      <li></li>
      <li><a href="landscape">Landscape</a></li>
      <li><a href="portrait">Portrait</a></li>
      <li><a href="concert">Concert</a></li>
      <li><a href="stylistic" class="active">Stylistic</a></li>
    </ul>
    <button class="nav-toggle" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <main>

    <div class="gallery-header">
      <p class="gallery-eyebrow">Collection 04</p>
      <h1 class="gallery-title">Artistic &amp;<br>Stylistic</h1>
      <p class="gallery-desc">
        Cool pictures.
      </p>
    </div>

    <!-- 
      ══════════════════════════════════════════════
      GALLERY — Add your images here
      
      For each photo:
      1. Add it to the /images/ folder (or a subfolder like /images/stylistic/)
      2. Copy a <div class="photo-item"> block below
      3. Update src, data-src, and data-alt
      
      Use data-src for the full-resolution lightbox image (can be same as src).
      ══════════════════════════════════════════════
    -->
    <div class="gallery-masonry">

      <div class="photo-item" data-src="../images/stylistic/photo-01-full.jpg" data-alt="Mountain sunrise">
        <img src="../images/stylistic/photo-01.jpg" alt="Mountain sunrise"
          onerror="this.style.cssText='display:block;width:100%;height:280px;background:linear-gradient(135deg,#1a2a1a,#2a3a20)'">
      </div>

      <div class="photo-item" data-src="../images/stylistic/photo-02-full.jpg" data-alt="Glass tower reflections">
        <img src="../images/stylistic/photo-02.jpg" alt="Glass tower reflections"
          onerror="this.style.cssText='display:block;width:100%;height:380px;background:linear-gradient(135deg,#141a22,#1e2a30)'">
      </div>

      <div class="photo-item" data-src="../images/stylistic/photo-03-full.jpg" data-alt="Desert dunes at dusk">
        <img src="../images/stylistic/photo-03.jpg" alt="Desert dunes at dusk"
          onerror="this.style.cssText='display:block;width:100%;height:320px;background:linear-gradient(135deg,#2a1e10,#3a2a18)'">
      </div>

      <div class="photo-item" data-src="../images/stylistic/photo-04-full.jpg" data-alt="Brutalist concrete facade">
        <img src="../images/stylistic/photo-04.jpg" alt="Brutalist concrete facade"
          onerror="this.style.cssText='display:block;width:100%;height:260px;background:linear-gradient(135deg,#1e1e1e,#2a2a2a)'">
      </div>

      <div class="photo-item" data-src="../images/stylistic/photo-05-full.jpg" data-alt="Foggy valley morning">
        <img src="../images/stylistic/photo-05.jpg" alt="Foggy valley morning"
          onerror="this.style.cssText='display:block;width:100%;height:350px;background:linear-gradient(135deg,#1a2020,#202828)'">
      </div>

      <div class="photo-item" data-src="../images/stylistic/photo-06-full.jpg" data-alt="Steel bridge at night">
        <img src="../images/stylistic/photo-06.jpg" alt="Steel bridge at night"
          onerror="this.style.cssText='display:block;width:100%;height:300px;background:linear-gradient(135deg,#0e0e1a,#181830)'">
      </div>

      <!-- ↑ Duplicate blocks above to add more photos ↑ -->

    </div>

  </main>

  <!-- ── Lightbox ── -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">&times;</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
  </div>

  <!-- ── Footer ── -->
  <footer>
    <p class="footer-brand">Your<span>.</span>Name Photography</p>
    <p class="footer-copy">&copy; 2025 — All rights reserved</p>
  </footer>

  <script src="../js/main.js"></script>
</body>
</html>
