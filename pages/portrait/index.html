  <main>

    <div class="gallery-header">
      <p class="gallery-eyebrow">Collection 02</p>
      <h1 class="gallery-title">Portrait &amp;<br>Personal</h1>
      <p class="gallery-desc">
        You.
      </p>
    </div>

    <!-- 
      ══════════════════════════════════════════════
      GALLERY — Add your images here
      
      For each photo:
      1. Add it to the /images/ folder (or a subfolder like /images/portrait/)
      2. Copy a <div class="photo-item"> block below
      3. Update src, data-src, and data-alt
      
      Use data-src for the full-resolution lightbox image (can be same as src).
      ══════════════════════════════════════════════
    -->
    <div class="gallery-masonry">

      <div class="photo-item" data-src="/images/Portrait/Jude_Greece_Bench_Sunset.jpg"
        data-alt="Jude Schiffer on a bench during sunset in Greece">
        <img src="/images/Portrait/Jude_Greece_Bench_Sunset.jpg" alt="Jude Schiffer on a bench during sunset in Greece"
          onerror="this.style.cssText='display:block;width:100%;height:280px;background:linear-gradient(135deg,#1a2a1a,#2a3a20)'">
      </div>
      <div class="photo-item" data-src="/images/Portrait/Picking_Flowers_Greece.jpg"
        data-alt="Young woman picking flowers in a field in Greece">
        <img src="/images/Portrait/Picking_Flowers_Greece.jpg" alt="Young woman picking flowers in a field in Greece"
          onerror="this.style.cssText='display:block;width:100%;height:280px;background:linear-gradient(135deg,#1a2a1a,#2a3a20)'">
      </div>
      <div class="photo-item" data-src="/images/Portrait/Cat_Greece.jpg"
        data-alt="Cat being pet in Athens, Greece">
        <img src="/images/Portrait/Cat_Greece.jpg" alt="Cat being pet in Athens, Greece"
          onerror="this.style.cssText='display:block;width:100%;height:280px;background:linear-gradient(135deg,#1a2a1a,#2a3a20)'">
      </div>
      <div class="photo-item" data-src="/images/Portrait/Elsa_Tree_Shot.jpg"
        data-alt="Elsa Shilling with a tree outside of Hill Hall">
        <img src="/images/Portrait/Elsa_Tree_Shot.jpg" alt="Elsa Shilling with a tree outside of Hill Hall"
          onerror="this.style.cssText='display:block;width:100%;height:280px;background:linear-gradient(135deg,#1a2a1a,#2a3a20)'">
      </div>
      <div class="photo-item" data-src="/images/Portrait/Elsa_Bridge_Snowing.jpg"
        data-alt="Elsa Shilling standing on a bridge in the snow">
        <img src="/images/Portrait/Elsa_Bridge_Snowing.jpg" alt="Elsa Shilling standing on a bridge in the snow"
          onerror="this.style.cssText='display:block;width:100%;height:280px;background:linear-gradient(135deg,#1a2a1a,#2a3a20)'">
      </div>
      <div class="photo-item" data-src="/images/Portrait/Cassidy_Portrait_B&W.JPG"
        data-alt="Cassidy Lober on a swing set, blacka and white">
        <img src="/images/Portrait/Cassidy_Portrait_B&W.JPG" alt="Cassidy Lober on a swing set, black and white"
          onerror="this.style.cssText='display:block;width:100%;height:280px;background:linear-gradient(135deg,#1a2a1a,#2a3a20)'">
      </div>

      <!-- ↑ Duplicate blocks above to add more photos ↑ -->

    </div>

  </main>

  <!-- ── Lightbox ── -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">&times;</button>
    <img class="lightbox-img" id="lightbox-img" src="" alt="">
  </div>
